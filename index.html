<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JARVIS - World's Largest Database AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            background: radial-gradient(circle at 20% 20%, #0f2027, #000000 90%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
        }

        .login-box {
            background: rgba(10, 20, 30, 0.9);
            padding: 40px 30px;
            border-radius: 28px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }

        .login-box h2 {
            color: cyan;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-box .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
        }

        .login-box input:focus {
            outline: none;
            border-color: cyan;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            margin: 20px 0 15px;
            border: none;
            border-radius: 30px;
            background: cyan;
            color: black;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #login-msg {
            color: #ff6b6b;
            font-size: 13px;
        }

        .info-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        /* Main Interface */
        #main {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-toggle {
            display: none;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid cyan;
            color: cyan;
            font-size: 20px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logo h1 {
            color: cyan;
            font-size: 20px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-display {
            padding: 4px 10px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid cyan;
            border-radius: 20px;
            font-size: 11px;
            color: cyan;
        }

        .user-email {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 11px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Main Container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.6);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 16px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-title {
            color: cyan;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 6px;
        }

        .processing-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .processing-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .processing-item.active {
            border-left: 2px solid cyan;
            background: rgba(0, 255, 255, 0.05);
        }

        .processing-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 255, 0.15);
            border-radius: 8px;
            color: cyan;
        }

        .processing-name {
            font-size: 13px;
            font-weight: 500;
        }

        .processing-desc {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
        }

        .stats-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stats-number {
            font-size: 28px;
            color: cyan;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .sidebar-button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 25px;
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            min-width: 0;
            height: 100%;
        }

        /* Chat Messages - Scrollable */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            margin-bottom: 12px;
        }

        .user-message {
            margin-left: auto;
        }

        .bot-message {
            margin-right: auto;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message .message-content {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid cyan;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom-left-radius: 4px;
        }

        .system-message {
            margin: 8px auto;
            text-align: center;
            max-width: 85%;
        }

        .system-message .message-content {
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc864;
            font-size: 11px;
            padding: 6px 12px;
        }

        .message-meta {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
        }

        .user-message .message-meta {
            justify-content: flex-end;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: cyan;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input Area - FIXED AT BOTTOM */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
        }

        #input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            background: rgba(30, 30, 50, 0.9);
            color: white;
            font-size: 15px;
        }

        #input:focus {
            outline: none;
            border-color: cyan;
        }

        #input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #sendBtn {
            padding: 0 20px;
            border: none;
            border-radius: 30px;
            background: cyan;
            color: black;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Quick Actions - Scrollable */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }

        .quick-actions::-webkit-scrollbar {
            height: 3px;
        }

        .quick-btn {
            padding: 6px 14px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 20px;
            background: rgba(0, 255, 255, 0.05);
            color: #ddd;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 90;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            
            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                background: rgba(10, 10, 20, 0.98);
                width: 75%;
                max-width: 260px;
            }
            
            .sidebar.visible {
                transform: translateX(0);
            }
            
            .message {
                max-width: 90%;
            }
            
            .user-email {
                max-width: 100px;
                font-size: 10px;
            }
            
            .header {
                padding: 10px 12px;
            }
            
            .logo h1 {
                font-size: 18px;
            }
            
            .chat-messages {
                padding: 12px;
            }
            
            .input-area {
                padding: 10px 12px;
            }
            
            #input {
                padding: 10px 14px;
                font-size: 14px;
            }
            
            #sendBtn {
                padding: 0 16px;
                font-size: 13px;
            }
            
            .quick-actions {
                padding: 0 12px 10px;
            }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
    <div class="login-box">
        <h2>JARVIS</h2>
        <div class="subtitle">Authorized Access Only</div>
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Access Code" autocomplete="off">
        <button onclick="login()">Access System</button>
        <p id="login-msg"></p>
        <div class="info-text">Built by Krish Palival<br>World's Largest Database AI</div>
    </div>
</div>

<!-- Main Interface -->
<div id="main" style="display: none;">
    <div class="header">
        <div class="logo">
            <span class="menu-toggle" onclick="toggleSidebar()">☰</span>
            <h1>JARVIS</h1>
            <span class="status-badge" id="status">Active</span>
        </div>
        <div class="user-info">
            <div class="session-display">∞</div>
            <div class="user-email" id="userEmail"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Processing Units</div>
                <div class="processing-list" id="processingList"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">System Status</div>
                <div class="stats-box">
                    <div class="stats-number">∞</div>
                    <div class="stats-label">Neural Capacity</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="sidebar-button" onclick="newChat()">⟳ New Session</button>
                <button class="sidebar-button" onclick="clearHistory()">⌫ Clear Memory</button>
                <button class="sidebar-button" onclick="logout()">🚪 Exit</button>
                <button class="sidebar-button" onclick="toggleSidebar()">📱 Hide Sidebar</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-messages" id="chat"></div>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickPrompt('What is artificial intelligence?')">What is AI?</button>
                <button class="quick-btn" onclick="quickPrompt('Write Python code to sort a list')">Python Code</button>
                <button class="quick-btn" onclick="quickPrompt('Tell me an interesting fact')">Interesting Fact</button>
                <button class="quick-btn" onclick="quickPrompt('Explain quantum computing')">Quantum</button>
            </div>

            <!-- INPUT BAR - NOW VISIBLE ON MOBILE -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="input" placeholder="Ask JARVIS anything..." onkeypress="handleKeyPress(event)">
                </div>
                <button onclick="send()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
let USER = "";
let isProcessing = false;

async function login() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let msg = document.getElementById("login-msg");

    if (!username || !password) {
        msg.innerText = "Enter username and access code";
        return;
    }

    try {
        let res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
        });

        let data = await res.json();

        if (data.success) {
            USER = username;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main").style.display = "flex";
            document.getElementById("userEmail").innerText = USER;
            
            addSystemMessage(`Welcome, ${USER}`);
            addSystemMessage("JARVIS neural network active");
            addSystemMessage("Unlimited processing capacity");
            loadProcessingUnits();
        } else {
            msg.innerText = data.error || "Access denied";
        }
    } catch (error) {
        msg.innerText = "Connection error";
    }
}

function loadProcessingUnits() {
    let list = document.getElementById("processingList");
    list.innerHTML = "";
    const units = [
        { name: "Primary Core", desc: "Active", icon: "⚡" },
        { name: "Neural Matrix", desc: "Optimized", icon: "🌀" },
        { name: "Deep Memory", desc: "Online", icon: "🔍" },
        { name: "Cognitive Layer", desc: "Ready", icon: "🌐" }
    ];
    units.forEach((unit, i) => {
        let div = document.createElement("div");
        div.className = `processing-item ${i === 0 ? 'active' : ''}`;
        div.innerHTML = `<div class="processing-icon">${unit.icon}</div>
            <div class="processing-info">
                <div class="processing-name">${unit.name}</div>
                <div class="processing-desc">${unit.desc}</div>
            </div>`;
        list.appendChild(div);
    });
}

async function send() {
    if (isProcessing) return;
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if (msg === "") return;

    addMessage(msg, "user");
    input.value = "";
    showTypingIndicator();
    setProcessing(true);

    try {
        let res = await fetch("/ai/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: msg, user: USER })
        });
        let data = await res.json();
        removeTypingIndicator();
        if (data.success) {
            addMessage(data.response, "bot");
        } else {
            addMessage("Processing error. Please try again.", "system");
        }
    } catch (error) {
        removeTypingIndicator();
        addMessage("Connection issue. Retrying...", "system");
    } finally {
        setProcessing(false);
    }
}

function quickPrompt(text) {
    document.getElementById("input").value = text;
    send();
}

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = `message ${type}-message`;
    let content = document.createElement("div");
    content.className = "message-content";
    content.innerText = text;
    let meta = document.createElement("div");
    meta.className = "message-meta";
    let time = document.createElement("span");
    time.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    meta.appendChild(time);
    div.appendChild(content);
    div.appendChild(meta);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addSystemMessage(text) {
    addMessage(text, "system");
}

function showTypingIndicator() {
    let chat = document.getElementById("chat");
    let indicator = document.createElement("div");
    indicator.className = "message bot-message";
    indicator.id = "typingIndicator";
    let content = document.createElement("div");
    content.className = "typing-indicator";
    for (let i = 0; i < 3; i++) content.appendChild(document.createElement("span"));
    indicator.appendChild(content);
    chat.appendChild(indicator);
    chat.scrollTop = chat.scrollHeight;
}

function removeTypingIndicator() {
    let indicator = document.getElementById("typingIndicator");
    if (indicator) indicator.remove();
}

function setProcessing(processing) {
    isProcessing = processing;
    document.getElementById("sendBtn").disabled = processing;
    document.getElementById("input").disabled = processing;
}

function handleKeyPress(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        send();
    }
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('visible');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
}

function newChat() {
    document.getElementById("chat").innerHTML = "";
    addSystemMessage("New session initialized");
    if (window.innerWidth <= 768) toggleSidebar();
}

function clearHistory() {
    if (confirm("Clear memory cache?")) {
        document.getElementById("chat").innerHTML = "";
        addSystemMessage("Memory cache cleared");
        if (window.innerWidth <= 768) toggleSidebar();
    }
}

function logout() {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("main").style.display = "none";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}

window.onload = function() {
    document.getElementById("username").focus();
};
</script>

</body>
</html>
